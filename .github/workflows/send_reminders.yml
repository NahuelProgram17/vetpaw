name: Send Reminders

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  send-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Run send_reminders
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          railway run --service fc248dc1-1b9c-4f17-b1e0-f0b991714eb8 python manage.py send_reminders